<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VSEH PRO</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f4f7fe; 
            font-family: 'Outfit', sans-serif; 
            overscroll-behavior-y: none;
            transition: background-color 0.3s ease;
        }
        
        .text-7 { font-size: 7px; line-height: 9px; }
        .text-8 { font-size: 8px; line-height: 10px; }
        .text-9 { font-size: 9px; line-height: 12px; }
        .text-10 { font-size: 10px; line-height: 14px; }
        .text-11 { font-size: 11px; line-height: 16px; }
        
        .rounded-24 { border-radius: 24px; }
        .rounded-32 { border-radius: 32px; }
        .max-w-500 { max-width: 500px; margin: 0 auto; }
        
        .view-section { display: none; padding-bottom: 120px; padding-top: 10px; }
        .view-section.active { display: block; animation: fadeUp 0.3s ease-out forwards; }
        
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .blink { animation: pulse-soft 1.5s infinite; }
        
        .force-uppercase { text-transform: uppercase; }
        ::-webkit-scrollbar { display: none; }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
        }
        .glass-nav { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.08);
        }
        
        .grad-card-1 { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
        .grad-card-2 { background: linear-gradient(135deg, #10b981, #3b82f6); }
        .grad-card-3 { background: linear-gradient(135deg, #f43f5e, #f97316); }
        .text-grad { background: linear-gradient(to right, #7c3aed, #4f46e5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .mobile-input {
            background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px;
            padding: 14px 16px; font-size: 13px !important; font-weight: 700; width: 100%;
            color: #1e293b; outline: none; transition: all 0.3s;
        }
        .mobile-input:focus { border-color: #6366f1; background: #ffffff; box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }
        
        .drag-handle { width: 45px; height: 5px; background: #cbd5e1; border-radius: 5px; margin: 0 auto 20px auto; }

        /* Attendance Styles */
        .att-card {
            padding: 14px; border-radius: 20px; background: white;
            border: 2px solid #e2e8f0; transition: all 0.2s;
        }
        .att-card.present { border-color: #10b981; background: #f0fdf4; }
        .att-card.absent { border-color: #ef4444; background: #fef2f2; }
        .att-card.leave { border-color: #f59e0b; background: #fffbeb; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden w-full max-w-500 relative transition-colors duration-300">

    <!-- === YOUR ORIGINAL CODE STARTS FROM HERE === -->
    <div id="toast" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-[100] transition-all duration-300 opacity-0 pointer-events-none w-11/12" style="max-width: 400px;">
        <div class="bg-gray-900 text-white px-5 py-3.5 rounded-full shadow-2xl flex items-center justify-center text-xs font-black uppercase tracking-widest border border-gray-700">
            <i class="fas fa-check-circle text-green-400 mr-2 text-lg"></i> <span id="toastMsg">Synced Successfully</span>
        </div>
    </div>

    <div id="globalLoader" class="fixed inset-0 bg-[#f4f7fe] dark-target z-[999] flex flex-col items-center justify-center p-6 text-center">
        <div class="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-5"></div>
        <p class="text-indigo-600 font-black tracking-widest text-sm animate-pulse uppercase">INITIALIZING...</p>
    </div>

    <header class="glass-panel mx-4 mt-4 mb-2 rounded-3xl z-20 flex justify-between items-start p-4">
        <div class="flex flex-col flex-1 min-w-0 pr-2">
            <h1 class="text-xl font-black tracking-tight text-grad uppercase leading-tight whitespace-normal break-words">VSEH PRO</h1>
            <div class="flex items-center space-x-1.5 text-8 font-black text-gray-400 uppercase mt-1 tracking-widest whitespace-nowrap overflow-hidden">
                <i class="far fa-calendar-alt"></i> <span id="headerDate">--/--/----</span>
                <span class="text-gray-300">|</span>
                <i class="far fa-clock"></i> <span id="headerTime">00:00</span>
            </div>
        </div>
        <div class="flex flex-col items-end shrink-0 mt-0.5">
            <div class="flex items-center bg-red-50 text-red-600 px-1.5 py-0.5 rounded border border-red-100 blink shadow-sm mb-1">
                <span class="w-1 h-1 bg-red-600 rounded-full mr-1"></span>
                <span class="text-[7px] font-black uppercase tracking-widest leading-none mt-0.5">AI PRO</span>
            </div>
            <span class="font-bold text-gray-400 uppercase tracking-widest" style="font-size: 7px; white-space: nowrap;">Created by Guna</span>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 w-full">

        <!-- DASHBOARD -->
        <section id="dashboard" class="view-section active">
            <!-- Aapka pura dashboard code yahan hai (same as original) -->
            <div class="flex justify-between items-end mb-4 px-1">
                <h2 class="text-2xl font-black text-gray-800 tracking-tight">Overview</h2>
                <span class="text-10 font-black text-indigo-600 bg-indigo-100 px-2.5 py-1 rounded-lg uppercase">Dashboard</span>
            </div>
            <!-- ... rest of your dashboard ... -->
        </section>

        <!-- ATTENDANCE SECTION (NEW) -->
        <section id="attendance" class="view-section">
            <div class="flex justify-between items-end mb-6 px-1">
                <div>
                    <h2 class="text-2xl font-black text-gray-800 tracking-tight">Attendance Register</h2>
                    <p class="text-10 font-black text-gray-400 uppercase tracking-widest mt-1">Daily Class Wise Entry</p>
                </div>
            </div>
            
            <div class="glass-panel rounded-32 p-6">
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-10 font-black text-gray-500 uppercase tracking-widest ml-1 mb-1.5">SELECT CLASS</label>
                        <select id="attClass" onchange="loadAttendanceStudents()" class="mobile-input"></select>
                    </div>
                    <div>
                        <label class="block text-10 font-black text-gray-500 uppercase tracking-widest ml-1 mb-1.5">DATE</label>
                        <input type="date" id="attDate" class="mobile-input" onchange="loadAttendanceStudents()">
                    </div>
                </div>

                <div id="attendanceList" class="space-y-3 max-h-[420px] overflow-y-auto"></div>

                <button onclick="saveAttendance()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-sm mt-6 shadow-lg active:scale-95 transition uppercase tracking-widest">
                    SAVE ATTENDANCE & SEND ALERTS
                </button>
            </div>
        </section>

        <!-- AI HUB (Your Original) -->
        <section id="aihub" class="view-section">
            <!-- Aapka pura AI Hub code yahan paste kar do -->
        </section>

        <!-- STUDENTS, DEFAULTERS, FEE, SETTINGS (Your Original Sections) -->
        <!-- ... Aap in sections ko apne original file se copy karke yahan daal do ... -->

    </main>

    <!-- Bottom Navigation with Attendance -->
    <nav class="fixed bottom-0 w-full max-w-500 glass-nav flex justify-between items-end px-2 pt-2 z-40 rounded-t-3xl border-t border-gray-100 pb-safe">
        <button onclick="navigate('dashboard')" id="nav-dashboard" class="mob-nav flex-1 flex flex-col items-center pb-2 text-indigo-600">
            <div class="w-8 h-8 flex items-center justify-center rounded-full mb-0.5 nav-icon-bg bg-indigo-50"><i class="fas fa-home text-lg"></i></div>
            <span class="text-8 font-black uppercase">Home</span>
        </button>
        <button onclick="navigate('students')" id="nav-students" class="mob-nav flex-1 flex flex-col items-center pb-2 text-gray-400">
            <div class="w-8 h-8 flex items-center justify-center rounded-full mb-0.5 nav-icon-bg"><i class="fas fa-users text-lg"></i></div>
            <span class="text-8 font-black uppercase">Students</span>
        </button>
        <button onclick="navigate('attendance')" id="nav-attendance" class="mob-nav flex-1 flex flex-col items-center pb-2 text-gray-400">
            <div class="w-8 h-8 flex items-center justify-center rounded-full mb-0.5 nav-icon-bg"><i class="fas fa-calendar-check text-lg"></i></div>
            <span class="text-8 font-black uppercase">Attendance</span>
        </button>
        <div class="relative flex-1 flex justify-center pb-6">
            <button onclick="navigate('fee')" class="absolute bottom-6 w-14 h-14 bg-green-500 text-white rounded-full shadow-lg flex items-center justify-center border-4 border-white active:scale-90">
                <i class="fas fa-plus text-2xl"></i>
            </button>
        </div>
        <button onclick="navigate('aihub')" id="nav-aihub" class="mob-nav flex-1 flex flex-col items-center pb-2 text-gray-400">
            <div class="w-8 h-8 flex items-center justify-center rounded-full mb-0.5 nav-icon-bg"><i class="fas fa-robot text-lg"></i></div>
            <span class="text-8 font-black uppercase">AI Hub</span>
        </button>
    </nav>

    <script>
        // === Aapka Pura Original Script Yahan Paste Kar Do ===
        // (Jo file aapne di thi uska pura <script> tag ka content)

        // Extra Attendance Functions
        function loadAttendanceStudents() {
            const cls = document.getElementById('attClass').value;
            const container = document.getElementById('attendanceList');
            container.innerHTML = '';

            if(!cls) return;

            const students = appData.students.filter(s => s.class === cls);

            students.forEach(stu => {
                const div = document.createElement('div');
                div.className = `att-card flex justify-between items-center`;
                div.innerHTML = `
                    <div>
                        <p class="font-black">${stu.name}</p>
                        <p class="text-xs text-gray-500">${stu.phone}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="markAttendance('${stu.id}', 'Present', this)" class="px-4 py-1 text-xs font-black rounded-xl bg-green-100 text-green-700">P</button>
                        <button onclick="markAttendance('${stu.id}', 'Absent', this)" class="px-4 py-1 text-xs font-black rounded-xl bg-red-100 text-red-700">A</button>
                        <button onclick="markAttendance('${stu.id}', 'Leave', this)" class="px-4 py-1 text-xs font-black rounded-xl bg-orange-100 text-orange-700">L</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        let tempAttendance = {};
        function markAttendance(id, status) {
            tempAttendance[id] = status;
            showToast(status + " Marked");
        }

        async function saveAttendance() {
            if(Object.keys(tempAttendance).length === 0) {
                alert("Koi student select nahi kiya!");
                return;
            }
            showToast("Attendance Saved Successfully!");
            tempAttendance = {};
        }

        // Updated Navigate
        function navigate(id) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.mob-nav').forEach(nav => nav.classList.remove('text-indigo-600'));
            const btn = document.getElementById('nav-'+id);
            if(btn) btn.classList.add('text-indigo-600');
        }
    </script>
</body>
</html>
